<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECOG Infinite</title>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* ===== NAVBAR ===== */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1a1a1a;
  padding: 10px 20px;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

/* SEARCH */
.search-box {
  padding: 6px;
  border-radius: 6px;
  border: none;
  outline: none;
}

/* ===== CATEGORY BUTTONS ===== */
.categories {
  text-align: center;
  margin: 15px;
}

.categories button {
  margin: 5px;
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #2a2a2a;
  color: white;
  cursor: pointer;
}

.categories button:hover {
  background: #444;
}

/* ===== GRID ===== */
.flex-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

/* ===== GAME CARD ===== */
.game-link {
  text-decoration: none;
}

.game-tile {
  background: #1c1c1c;
  border-radius: 12px;
  width: 180px;
  padding: 10px;
  text-align: center;
  transition: 0.2s;
}

.game-tile:hover {
  transform: scale(1.08);
  background: #2a2a2a;
  box-shadow: 0 0 15px rgba(255,255,255,0.15);
}

/* ===== IMAGE ===== */
.game-icon {
  width: 100%;
  border-radius: 10px;
}

/* ===== TITLE ===== */
.game-title {
  font-size: 14px;
  margin-top: 8px;
}

/* ===== POPULAR ===== */
.popular {
  border: 2px solid red;
}

</style>
</head>

<body>
<!-- NAVIGATION BAR -->
<style>
.navbar {
    text-align: center;
    margin-bottom: 20px;
}

.nav-button {
    display: inline-block;
    padding: 12px 20px;
    margin: 10px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
    text-decoration: none;
    border-radius: 10px;
    transition: 0.2s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.nav-button:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #00f2fe, #4facfe);
}
</style>

<div class="navbar">
    <a href="index.html" class="nav-button">🏠 Main Page</a>
    <a href="emulators.html" class="nav-button">🎮 Emulators</a>
</div>


<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">ECOG Infinite</div>
  <input type="text" id="search" class="search-box" placeholder="Search games...">
</div>


<!-- GAMES -->
<div class="flex-container" id="gameContainer">

<a href="1v1.lol/1v1.LOL.html" class="game-link"><div class="game-tile popular"><img src="1v1.lol/1v1lol1.png" class="game-icon"><div class="game-title">1v1.LOL</div></div></a>

<a href="99nitf/99nights.html" class="game-link"><div class="game-tile"><img src="99nitf/99nights.png" class="game-icon"><div class="game-title">99 Nights</div></div></a>

<a href="A Dance Of Fire And Ice/adofai.html" class="game-link"><div class="game-tile popular"><img src="A Dance Of Fire And Ice/adofai.png" class="game-icon"><div class="game-title">ADOFAI</div></div></a>

<a href="A Dark Room/adarkroom.html" class="game-link"><div class="game-tile"><img src="A Dark Room/darkroom.png" class="game-icon"><div class="game-title">A Dark Room</div></div></a>





</div>

<script>

/* ===== SEARCH ===== */
document.getElementById("search").addEventListener("keyup", function() {
  let filter = this.value.toLowerCase();
  let games = document.querySelectorAll(".game-link");

  games.forEach(game => {
    let title = game.innerText.toLowerCase();
    game.style.display = title.includes(filter) ? "block" : "none";
  });
});

/* ===== CATEGORY FILTER ===== */
function filterGames(category) {
  let games = document.querySelectorAll(".game-link");

  games.forEach(game => {
    if (category === "all") {
      game.style.display = "block";
    } else {
      let cats = game.getAttribute("data-category");
      game.style.display = cats.includes(category) ? "block" : "none";
    }
  });
}

</script>

</body>
</html>
